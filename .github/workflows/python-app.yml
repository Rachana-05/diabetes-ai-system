name: Diabetes AI CI

on:

  push:
    branches:
      - main

  pull_request:
    branches:
      - main

jobs:

  build:

    runs-on: ubuntu-latest

    steps:

      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Upgrade pip
        run: |
          python -m pip install --upgrade pip

      - name: Install Core Dependencies
        run: |

          pip install fastapi
          pip install uvicorn
          pip install numpy
          pip install pandas
          pip install scikit-learn
          pip install torch
          pip install joblib

      - name: Verify CI Pipeline
        run: |

          echo "Diabetes AI System CI Passed"